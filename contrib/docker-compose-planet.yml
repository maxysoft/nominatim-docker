# For a full planet instance, we apply some best practices from the documentation (like using a flatnode file).
# This compose file uses bind mounts, so it'll reference /data. You can either also mount the storage (for DB + flat node file) under /data or change it.
# Minimum specification for a machine running the import (if this succeeded on a lower spec machine, please contribute them):
# - 16 core CPU (set THREADS variable to number of cores/threads available)
# - 64GB RAM
# - 1.5TB (NVMe) SSD storage

x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-size: 10m
      max-file: "3"

services:
  nominatim-postgres:
    image: postgis/postgis:18-3.6-alpine@sha256:dd5cbfb841cb3572ddabeb949c6b7649edf320a8dc960d7e049ec535c2631a54
    container_name: nominatim-postgres
    hostname: nominatim-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: very_secure_password
      POSTGRES_USER: postgres
      POSTGRES_DB: nominatim
    volumes:
      - type: bind
        source: /data/db
        target: /var/lib/postgresql
      - type: bind
        source: ./contrib/postgres/planet-postgresql.conf
        target: /etc/postgresql/postgresql.conf
        read_only: true
    # PostgreSQL configuration optimized for planet Nominatim import
    # Tuned for 64 GB RAM + NVMe SSD as per minimum spec above
    command: >
      postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    <<: *logging
    networks:
      - nominatim-net

  nominatim:
    image: ghcr.io/maxysoft/nominatim-docker:latest
    container_name: nominatim
    hostname: nominatim
    restart: unless-stopped
    shm_size: 1gb
    ports:
      - "8080:8080"
    environment:
      # External database configuration
      POSTGRES_HOST: nominatim-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: nominatim
      NOMINATIM_PASSWORD: very_secure_password
      POSTGRES_ADMIN_PASSWORD: very_secure_password

      # Planet-specific Nominatim configuration
      # https://ftp5.gwdg.de/pub/misc/openstreetmap/planet.openstreetmap.org/pbf/planet-latest.osm.pbf returns 404.
      # Use a specific dated version:
      PBF_URL: https://ftp5.gwdg.de/pub/misc/openstreetmap/planet.openstreetmap.org/pbf/planet-250317.osm.pbf
      REPLICATION_URL: https://ftp5.gwdg.de/pub/misc/openstreetmap/planet.openstreetmap.org/replication/day/
      IMPORT_WIKIPEDIA: "true"
      IMPORT_US_POSTCODES: "true"
      IMPORT_GB_POSTCODES: "true"
      THREADS: 16
    volumes:
      - type: bind
        source: /data/nominatim
        target: /nominatim
    depends_on:
      nominatim-postgres:
        condition: service_healthy
        restart: true
    <<: *logging
    networks:
      - nominatim-net

networks:
  nominatim-net:
    name: nominatim-net
