# Planet import PostgreSQL configuration
# Mounted by contrib/docker-compose-planet.yml

listen_addresses = '*'

# Memory and performance tuning for 16 cores / 64GB RAM
shared_buffers = 16GB
maintenance_work_mem = 20GB
autovacuum_work_mem = 2GB
work_mem = 50MB
effective_cache_size = 48GB

# Durability / WAL
synchronous_commit = off
max_wal_size = 10GB
checkpoint_timeout = 60min
checkpoint_completion_target = 0.9

# Connections and IO
max_connections = 200
random_page_cost = 1.0
effective_io_concurrency = 200
