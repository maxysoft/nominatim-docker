# Local test Postgres configuration tuned for ~512MB RAM
# Mounted by contrib/docker-compose-local.yml

listen_addresses = '*'

shared_buffers = 128MB
maintenance_work_mem = 128MB
autovacuum_work_mem = 64MB
work_mem = 4MB
effective_cache_size = 256MB

# Durability / WAL
synchronous_commit = off
max_wal_size = 256MB
checkpoint_timeout = 5min
checkpoint_completion_target = 0.9

# Connections
max_connections = 50
