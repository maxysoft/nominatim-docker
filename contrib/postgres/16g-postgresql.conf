# Nominatim (16GB) PostgreSQL configuration
# Mounted by contrib/docker-compose.yml

listen_addresses = '*'

# Memory and performance tuning (for ~16GB RAM machines)
shared_buffers = 4GB
maintenance_work_mem = 6GB
autovacuum_work_mem = 1GB
work_mem = 50MB
effective_cache_size = 10GB

# Durability / WAL
synchronous_commit = off
max_wal_size = 3GB
checkpoint_timeout = 20min
checkpoint_completion_target = 0.9

# Connections
max_connections = 100
