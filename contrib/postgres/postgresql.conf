# Mounted by contrib/docker-compose-varnish.yml

listen_addresses = '*'

# Memory and performance tuning (suitable for an ~8GB host)
# shared_buffers is typically set to ~25% of system memory
shared_buffers = 2GB
# memory for maintenance operations such as VACUUM and CREATE INDEX
maintenance_work_mem = 1GB
# memory used by autovacuum workers
autovacuum_work_mem = 256MB
# per-sort/per-connection working memory
work_mem = 16MB
# planner estimate of available OS cache (approx 75% of RAM)
effective_cache_size = 6GB

# Durability / WAL
synchronous_commit = off
max_wal_size = 2GB
checkpoint_timeout = 10min
checkpoint_completion_target = 0.9

# Connections
max_connections = 200
