x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-size: 10m
      max-file: "3"

services:
  nominatim-postgres:
    image: postgis/postgis:18-3.6-alpine@sha256:dd5cbfb841cb3572ddabeb949c6b7649edf320a8dc960d7e049ec535c2631a54
    container_name: nominatim-postgres
    hostname: nominatim-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: very_secure_password
      POSTGRES_USER: postgres
      POSTGRES_DB: nominatim
    volumes:
      - type: volume
        source: postgres-data
        target: /var/lib/postgresql
      - type: bind
        source: ./postgres/postgresql-local.conf
        target: /etc/postgresql/postgresql.conf
        read_only: true
    # PostgreSQL configuration optimized for 512 MB RAM machine
    command: >
      postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    <<: *logging
    networks:
      - nominatim-net

  nominatim:
    build:
      context: ..
      dockerfile: Dockerfile
    image: nominatim:local
    container_name: nominatim-local
    hostname: nominatim-local
    restart: unless-stopped
    shm_size: 1gb
    ports:
      - "8080:8080"
    environment:
      # External database configuration
      POSTGRES_HOST: nominatim-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: nominatim
      NOMINATIM_PASSWORD: very_secure_password
      POSTGRES_ADMIN_PASSWORD: very_secure_password
      
      # Nominatim configuration
      # see https://github.com/maxysoft/nominatim-docker/tree/master/5.3#configuration for more options
      PBF_URL: https://download.geofabrik.de/europe/monaco-latest.osm.pbf
      REPLICATION_URL: https://download.geofabrik.de/europe/monaco-updates/

      # Read-only Hetzner storage box for supplementary data (Wikipedia, postcodes, Tiger).
      # Uncomment and set IMPORT_WIKIPEDIA / IMPORT_GB_POSTCODES / IMPORT_US_POSTCODES to "true" to use them.
      # STORAGE_USER: u355874-sub1
      # STORAGE_HOST: u355874-sub1.your-storagebox.de
      # STORAGE_PASSWORD: DMg5bmLPY7npHL2Q
    volumes:
      - nominatim-data:/nominatim
    depends_on:
      nominatim-postgres:
        condition: service_healthy
        restart: true
    <<: *logging
    networks:
      - nominatim-net

volumes:
  postgres-data:
  nominatim-data:

networks:
  nominatim-net:
    name: nominatim-net
