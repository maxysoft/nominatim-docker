                -v nominatim-data5:/nominatim \
                -p 8006:8080 \
                --name nominatim \
                nominatim:$NOMINATIM_VERSION &

              ./assert-empty-json "http://localhost:8006/search.php?q=hotel%20de%20paris"
              ./assert-non-empty-json "http://localhost:8006/status.php?format=json"
              
              # Cleanup
              docker stop nominatim postgres || true
              docker network rm nominatim-net5 || true

          - name: Import with PBF_PATH
            commands: |-
              # Start PostgreSQL with PostGIS
              docker network create nominatim-net6
              docker run -d --rm --name postgres --network nominatim-net6 \
                -e POSTGRES_PASSWORD=very_secure_password \
                -e POSTGRES_USER=postgres \
                -e POSTGRES_DB=nominatim \
                postgis/postgis:18-3.6-alpine
              
              # Wait for PostgreSQL to be ready (matches docker-compose healthcheck)
              until docker exec postgres pg_isready -U postgres >/dev/null 2>&1; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
              
              wget --cut-dirs=1 -nH -xP /tmp/data http://download.geofabrik.de/europe/monaco-latest.osm.pbf
              docker run -i --rm --network nominatim-net6 \
                --shm-size 1g \
                -e POSTGRES_HOST=postgres \
                -e POSTGRES_PORT=5432 \
                -e POSTGRES_DB=nominatim \
                -e NOMINATIM_PASSWORD=very_secure_password \
                -e POSTGRES_ADMIN_PASSWORD=very_secure_password \
                -e PBF_PATH=/nominatim/data/monaco-latest.osm.pbf \
                -e REPLICATION_URL=http://download.geofabrik.de/europe/monaco-updates/ \
                -v nominatim-data6:/nominatim \
