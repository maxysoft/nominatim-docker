              echo "PostgreSQL is ready"
              
              docker run --detach --network nominatim-net11 \
                --shm-size 1g \
                -e POSTGRES_HOST=postgres \
                -e POSTGRES_PORT=5432 \
                -e POSTGRES_DB=nominatim \
                -e NOMINATIM_PASSWORD=very_secure_password \
                -e POSTGRES_ADMIN_PASSWORD=very_secure_password \
                -e PBF_URL=http://download.geofabrik.de/europe/monaco-latest.osm.pbf \
                -v nominatim-data11:/nominatim \
                -p 8012:8080 \
                --name nominatim \
                nominatim:$NOMINATIM_VERSION
            
              ./assert-non-empty-json "http://localhost:8012/search.php?q=avenue%20pasteur"
              ./assert-non-empty-json "http://localhost:8012/status.php?format=json"
              # Shutdown the container
              docker stop -t 60 nominatim
              # Verify that the exit code is zero
              CONTAINER_EXIT_CODE=$(docker inspect nominatim --format='{{.State.ExitCode}}')
              test "$CONTAINER_EXIT_CODE" -eq 0
              
              # Cleanup
              docker rm nominatim || true
              docker stop postgres || true
              docker network rm nominatim-net11 || true

          - name: WARMUP_ON_STARTUP=true
            commands: |-
              # Start PostgreSQL with PostGIS
              docker network create nominatim-net12
              docker run -d --rm --name postgres --network nominatim-net12 \
                -e POSTGRES_PASSWORD=very_secure_password \
                -e POSTGRES_USER=postgres \
                -e POSTGRES_DB=nominatim \
                postgis/postgis:18-3.6-alpine
              
              # Wait for PostgreSQL to be ready (matches docker-compose healthcheck)
              until docker exec postgres pg_isready -U postgres >/dev/null 2>&1; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
              
              docker run -i --rm --network nominatim-net12 \
                --shm-size 1g \
                -e POSTGRES_HOST=postgres \
                -e POSTGRES_PORT=5432 \
                -e POSTGRES_DB=nominatim \
                -e NOMINATIM_PASSWORD=very_secure_password \
                -e POSTGRES_ADMIN_PASSWORD=very_secure_password \
                -e PBF_URL=http://download.geofabrik.de/europe/monaco-latest.osm.pbf \
                -e WARMUP_ON_STARTUP=true \
                -v nominatim-data12:/nominatim \
                -p 8013:8080 \
                --name nominatim \
                nominatim:$NOMINATIM_VERSION &

              ./assert-non-empty-json "http://localhost:8013/search.php?q=avenue%20pasteur"
              ./assert-non-empty-json "http://localhost:8013/status.php?format=json"
              docker logs nominatim | grep "Warming finished"
              
              # Cleanup
              docker stop nominatim postgres || true
              docker network rm nominatim-net12 || true

          - name: WARMUP_ON_STARTUP=false
            commands: |-
              # Start PostgreSQL with PostGIS
              docker network create nominatim-net13
              docker run -d --rm --name postgres --network nominatim-net13 \
                -e POSTGRES_PASSWORD=very_secure_password \
                -e POSTGRES_USER=postgres \
                -e POSTGRES_DB=nominatim \
                postgis/postgis:18-3.6-alpine
              
              # Wait for PostgreSQL to be ready (matches docker-compose healthcheck)
              until docker exec postgres pg_isready -U postgres >/dev/null 2>&1; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
              
              docker run -i --rm --network nominatim-net13 \
                --shm-size 1g \
                -e POSTGRES_HOST=postgres \
                -e POSTGRES_PORT=5432 \
                -e POSTGRES_DB=nominatim \
                -e NOMINATIM_PASSWORD=very_secure_password \
                -e POSTGRES_ADMIN_PASSWORD=very_secure_password \
                -e PBF_URL=http://download.geofabrik.de/europe/monaco-latest.osm.pbf \
                -e WARMUP_ON_STARTUP=false \
                -v nominatim-data13:/nominatim \
                -p 8014:8080 \
                --name nominatim \
                nominatim:$NOMINATIM_VERSION &

              ./assert-non-empty-json "http://localhost:8014/search.php?q=avenue%20pasteur"
              ./assert-non-empty-json "http://localhost:8014/status.php?format=json"
              docker logs nominatim | grep "Skipping cache warmup"
              
              # Cleanup
              docker stop nominatim postgres || true
              docker network rm nominatim-net13 || true

          - name: API endpoints coverage
            commands: |-
              # Start PostgreSQL with PostGIS (same image as docker-compose.yml)
              docker network create nominatim-net14
              docker run -d --rm --name postgres --network nominatim-net14 \
                -e POSTGRES_PASSWORD=very_secure_password \
                -e POSTGRES_USER=postgres \
                -e POSTGRES_DB=nominatim \
                postgis/postgis:18-3.6-alpine
              
              # Wait for PostgreSQL to be ready (matches docker-compose healthcheck)
              until docker exec postgres pg_isready -U postgres >/dev/null 2>&1; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
              
              docker run -i --rm --network nominatim-net14 \
                --shm-size 1g \
                -e POSTGRES_HOST=postgres \
                -e POSTGRES_PORT=5432 \
                -e POSTGRES_DB=nominatim \
                -e NOMINATIM_PASSWORD=very_secure_password \
                -e POSTGRES_ADMIN_PASSWORD=very_secure_password \
                -e PBF_URL=http://download.geofabrik.de/europe/monaco-latest.osm.pbf \
                -e REPLICATION_URL=http://download.geofabrik.de/europe/monaco-updates/ \
                -v nominatim-data14:/nominatim \
                -p 8015:8080 \
                --name nominatim \
                nominatim:$NOMINATIM_VERSION &

              # /status endpoint: verify service is up, status=0, and version matches
              ./assert-non-empty-json "http://localhost:8015/status.php?format=json"
              ./assert-json-field "http://localhost:8015/status.php?format=json" "status" "^0$"
              ./assert-json-field "http://localhost:8015/status.php?format=json" "software_version" "^5\."
              ./assert-json-field "http://localhost:8015/status.php?format=json" "database_version" "^5\."

              # /search endpoint: verify avenue pasteur returns results
              ./assert-non-empty-json "http://localhost:8015/search.php?q=avenue%20pasteur"
              # verify Monaco country result has correct place_rank and class
              ./assert-json-field "http://localhost:8015/search.php?q=Monaco&format=json&limit=1" "name" "^Monaco$"
              ./assert-json-field "http://localhost:8015/search.php?q=Monaco&format=json&limit=1" "class" "^boundary$"
              ./assert-json-field "http://localhost:8015/search.php?q=Monaco&format=json&limit=1" "place_rank" "^4$"
              # verify addressdetails returns country field
              ./assert-json-field "http://localhost:8015/search.php?q=avenue%20pasteur&format=json&limit=1&addressdetails=1" "address.country" "Monaco"
              # verify polygon_geojson is returned
              ./assert-json-field "http://localhost:8015/search.php?q=Monaco&format=json&limit=1&polygon_geojson=1" "geojson.type" "olygon"
              # verify structured query (city+country) returns results
              ./assert-json-field "http://localhost:8015/search.php?city=Monaco&country=Monaco&format=json" "place_id" "."

              # /reverse endpoint: verify Palace of Monaco resolves to Monaco
              ./assert-non-empty-json "http://localhost:8015/reverse.php?lat=43.734&lon=7.42&format=json"
              ./assert-json-field "http://localhost:8015/reverse.php?lat=43.7314&lon=7.4197&format=json" "display_name" "Monaco"
              ./assert-json-field "http://localhost:8015/reverse.php?lat=43.7314&lon=7.4197&format=json" "address.country" "Monaco"

              # /lookup endpoint: verify OSM way and Monaco country relation
              ./assert-non-empty-json "http://localhost:8015/lookup.php?osm_ids=W201009264&format=json"
              ./assert-json-field "http://localhost:8015/lookup.php?osm_ids=R1124039&format=json" "osm_type" "^relation$"
              ./assert-json-field "http://localhost:8015/lookup.php?osm_ids=R1124039&format=json" "name" "^Monaco$"

              # /details endpoint: verify Monaco country via osmtype+osmid
              ./assert-json-field "http://localhost:8015/details.php?osmtype=R&osmid=1124039&format=json" "localname" "^Monaco$"
              ./assert-json-field "http://localhost:8015/details.php?osmtype=R&osmid=1124039&format=json" "category" "^boundary$"

              # verify Content-Type: application/json header
              CT=$(curl -sI "http://localhost:8015/search.php?q=Monaco&format=json" | grep -i "content-type")
              echo "$CT" | grep -qi "application/json" && echo "✅ Content-Type: application/json" || (echo "FAIL: Content-Type header: $CT"; exit 1)

              # Run database health check inside the container
              docker exec nominatim sudo -u nominatim nominatim admin --check-database --project-dir /nominatim
              
              # Cleanup
              docker stop nominatim postgres || true
              docker network rm nominatim-net14 || true
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: nominatim-${{ needs.build.outputs.NOMINATIM_VERSION }}
          path: /tmp
      - name: Load image
        run: |
          docker load --input /tmp/nominatim.tar
          docker image ls -a
      - name: Checkout
        uses: actions/checkout@v6.0.2

      # Excute the test scenario
      - name: ${{ matrix.test_scenario.name }}
        working-directory: .github/workflows
        run: ${{ matrix.test_scenario.commands }}
  
  publish:
    name: Publish docker image
    needs: test
    runs-on: ubuntu-latest
    # Only run on push to master branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Get commit short reference
        id: get_commit
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Extract Nominatim Version
        id: get_version
        run: echo "NOMINATIM_VERSION=$(grep -oP '(?<=ARG NOMINATIM_VERSION=)[0-9.]+' Dockerfile)" >> $GITHUB_OUTPUT

      # Verify Dockerfile exists and get build info
      - name: Verify Dockerfile
        run: |
          test -f Dockerfile
          echo "Dockerfile found ✅"
          echo "Nominatim version: ${{ steps.get_version.outputs.NOMINATIM_VERSION }}"
          echo "Commit SHA: ${{ steps.get_commit.outputs.SHORT_SHA }}"

      - name: Login to Docker Hub
        if: ${{ github.repository_owner == 'maxysoft' }}
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to Docker Hub
        if: ${{ github.repository_owner == 'maxysoft' }}
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ github.repository }}:v${{ steps.get_version.outputs.NOMINATIM_VERSION }}-${{ steps.get_commit.outputs.SHORT_SHA }}
            ${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.version=${{ steps.get_version.outputs.NOMINATIM_VERSION }}

      - name: Build and push to GitHub Container Registry
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:v${{ steps.get_version.outputs.NOMINATIM_VERSION }}-${{ steps.get_commit.outputs.SHORT_SHA }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.version=${{ steps.get_version.outputs.NOMINATIM_VERSION }}
