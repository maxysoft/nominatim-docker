          - name: REVERSE_ONLY
            commands: |-
              # Start PostgreSQL with PostGIS
              docker network create nominatim-net10
              docker run -d --rm --name postgres --network nominatim-net10 \
                -e POSTGRES_PASSWORD=very_secure_password \
