          - name: Check for clean shutdown
            commands: |-
              # Start PostgreSQL with PostGIS
              docker network create nominatim-net11
              docker run -d --rm --name postgres --network nominatim-net11 \
                -e POSTGRES_PASSWORD=very_secure_password \
