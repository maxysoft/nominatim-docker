              ./assert-non-empty-json "http://localhost:8008/status.php?format=json"
              
              # Cleanup
              docker stop nominatim postgres || true
              docker network rm nominatim-net7 || true

          - name: FREEZE
            commands: |-
              # Start PostgreSQL with PostGIS
              docker network create nominatim-net8
              docker run -d --rm --name postgres --network nominatim-net8 \
                -e POSTGRES_PASSWORD=very_secure_password \
                -e POSTGRES_USER=postgres \
