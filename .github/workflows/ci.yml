name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build docker image
    if: ${{ !contains(github.event.head_commit.message, 'skip_build') }}

    runs-on: ubuntu-latest
    outputs:
      NOMINATIM_VERSION: ${{ steps.get_version.outputs.NOMINATIM_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Extract Nominatim Version
        id: get_version
        run: echo "NOMINATIM_VERSION=$(grep -oP '(?<=ARG NOMINATIM_VERSION=)[0-9.]+' Dockerfile)" >> $GITHUB_OUTPUT

      - name: Build and export image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          tags: nominatim:${{ steps.get_version.outputs.NOMINATIM_VERSION }}
          outputs: type=docker,dest=/tmp/nominatim.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: nominatim-${{ steps.get_version.outputs.NOMINATIM_VERSION }}
          path: /tmp/nominatim.tar

  test:
    name: Test docker image
    needs: build
    if: ${{ needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      NOMINATIM_VERSION: ${{ needs.build.outputs.NOMINATIM_VERSION }}
      POSTGRES_PASSWORD: very_secure_password

    strategy:
      fail-fast: false
      matrix:
        test_scenario:
          - name: Import with PBF_URL and update
            commands: |-
              # Start PostgreSQL with PostGIS
              docker network create nominatim-net
              docker run -d --rm --name postgres --network nominatim-net \
                -e POSTGRES_PASSWORD=very_secure_password \
                -e POSTGRES_USER=postgres \
                -e POSTGRES_DB=nominatim \
                postgis/postgis:18-3.6-alpine
              
              # Wait for PostgreSQL to be ready (matches docker-compose healthcheck)
              until docker exec postgres pg_isready -U postgres >/dev/null 2>&1; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
              
              # get the data from four days ago to make sure there really are updates to apply
              four_days_ago=`date --date="4 days ago" +%y%m%d`
              docker run -i --rm --network nominatim-net \
                --shm-size 1g \
                -e POSTGRES_HOST=postgres \
                -e POSTGRES_PORT=5432 \
                -e POSTGRES_DB=nominatim \
                -e NOMINATIM_PASSWORD=very_secure_password \
                -e POSTGRES_ADMIN_PASSWORD=very_secure_password \
                -e PBF_URL=http://download.geofabrik.de/europe/monaco-${four_days_ago}.osm.pbf \
                -e REPLICATION_URL=http://download.geofabrik.de/europe/monaco-updates/ \
                -v nominatim-data:/nominatim \
                -p 8001:8080 \
                --name nominatim \
                nominatim:$NOMINATIM_VERSION &

              ./assert-non-empty-json "http://localhost:8001/search.php?q=avenue%20pasteur"
              ./assert-non-empty-json "http://localhost:8001/status.php?format=json"
              docker exec -i nominatim sudo -u nominatim nominatim replication --project-dir /nominatim --once
              ./assert-non-empty-json "http://localhost:8001/search.php?q=avenue%20pasteur"
              
              # Cleanup
              docker stop nominatim postgres || true
              docker network rm nominatim-net || true
          
          - name: Import with volume mount
            commands: |-
              # Start PostgreSQL with PostGIS
              docker network create nominatim-net2
              docker run -d --rm --name postgres --network nominatim-net2 \
                -e POSTGRES_PASSWORD=very_secure_password \
                -e POSTGRES_USER=postgres \
                -e POSTGRES_DB=nominatim \
                postgis/postgis:18-3.6-alpine
              
              # Wait for PostgreSQL to be ready (matches docker-compose healthcheck)
              until docker exec postgres pg_isready -U postgres >/dev/null 2>&1; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
              
              docker run -i --rm --network nominatim-net2 \
                --shm-size 1g \
                -e POSTGRES_HOST=postgres \
                -e POSTGRES_PORT=5432 \
                -e POSTGRES_DB=nominatim \
                -e NOMINATIM_PASSWORD=very_secure_password \
                -e POSTGRES_ADMIN_PASSWORD=very_secure_password \
                -e PBF_URL=http://download.geofabrik.de/europe/monaco-latest.osm.pbf \
                -e REPLICATION_URL=http://download.geofabrik.de/europe/monaco-updates/ \
                -v nominatim-data2:/nominatim \
                -p 8002:8080 \
                --name nominatim \
                nominatim:$NOMINATIM_VERSION &

              ./assert-non-empty-json "http://localhost:8002/search.php?q=avenue%20pasteur"
              ./assert-non-empty-json "http://localhost:8002/status.php?format=json"
              
              # Cleanup
              docker stop nominatim postgres || true
              docker network rm nominatim-net2 || true
          
          - name: Import with persistent data and container restart
            commands: |-
              # Start PostgreSQL with PostGIS with persistent volume
              docker network create nominatim-net3
              docker run -d --rm --name postgres --network nominatim-net3 \
                -e POSTGRES_PASSWORD=very_secure_password \
                -e POSTGRES_USER=postgres \
                -e POSTGRES_DB=nominatim \
                -v postgres-data:/var/lib/postgresql/data \
                postgis/postgis:18-3.6-alpine
              
              # Wait for PostgreSQL to be ready (matches docker-compose healthcheck)
              until docker exec postgres pg_isready -U postgres >/dev/null 2>&1; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
              
              # get the data from four days ago to make sure there really are updates to apply
              four_days_ago=`date --date="4 days ago" +%y%m%d`
              docker run -i --rm --network nominatim-net3 \
                --shm-size 1g \
                -e POSTGRES_HOST=postgres \
                -e POSTGRES_PORT=5432 \
                -e POSTGRES_DB=nominatim \
                -e NOMINATIM_PASSWORD=very_secure_password \
                -e POSTGRES_ADMIN_PASSWORD=very_secure_password \
                -e PBF_URL=http://download.geofabrik.de/europe/monaco-${four_days_ago}.osm.pbf \
                -e REPLICATION_URL=http://download.geofabrik.de/europe/monaco-updates/ \
                -v nominatim-data3:/nominatim \
                -p 8003:8080 \
                --name nominatim \
                nominatim:$NOMINATIM_VERSION &

              ./assert-non-empty-json "http://localhost:8003/search.php?q=avenue%20pasteur"
              ./assert-non-empty-json "http://localhost:8003/status.php?format=json"
              
              # Stop containers
              docker stop nominatim
              # the container needs a few seconds to shutdown cleanly apparently
              sleep 5

              # Start nominatim again with same database
              docker run -i --rm --network nominatim-net3 \
                --shm-size 1g \
                -e POSTGRES_HOST=postgres \
                -e POSTGRES_PORT=5432 \
                -e POSTGRES_DB=nominatim \
                -e NOMINATIM_PASSWORD=very_secure_password \
                -e POSTGRES_ADMIN_PASSWORD=very_secure_password \
                -e PBF_URL=http://download.geofabrik.de/europe/monaco-${four_days_ago}.osm.pbf \
                -e REPLICATION_URL=http://download.geofabrik.de/europe/monaco-updates/ \
                -v nominatim-data3:/nominatim \
                -p 8004:8080 \
                --name nominatim \
                nominatim:$NOMINATIM_VERSION &

              ./assert-non-empty-json "http://localhost:8004/search.php?q=avenue%20pasteur"
              docker exec -i nominatim sudo -u nominatim nominatim replication --project-dir /nominatim --once
              ./assert-non-empty-json "http://localhost:8004/search.php?q=avenue%20pasteur"
              
              # Cleanup
              docker stop nominatim postgres || true
              docker network rm nominatim-net3 || true

          - name: UPDATE_MODE=once
            commands: |-
              # Start PostgreSQL with PostGIS
              docker network create nominatim-net-update1
              docker run -d --rm --name postgres --network nominatim-net-update1 \
                -e POSTGRES_PASSWORD=very_secure_password \
