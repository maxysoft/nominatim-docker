                -p 8007:8080 \
                --name nominatim \
                nominatim:$NOMINATIM_VERSION &

              ./assert-non-empty-json "http://localhost:8007/search.php?q=avenue%20pasteur"
              ./assert-non-empty-json "http://localhost:8007/status.php?format=json"
              
              # Cleanup
              docker stop nominatim postgres || true
              docker network rm nominatim-net6 || true

          - name: REPLICATION_URL is blank
            commands: |-
              # Start PostgreSQL with PostGIS
              docker network create nominatim-net7
              docker run -d --rm --name postgres --network nominatim-net7 \
                -e POSTGRES_PASSWORD=very_secure_password \
                -e POSTGRES_USER=postgres \
                -e POSTGRES_DB=nominatim \
