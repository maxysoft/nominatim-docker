              # Cleanup
              docker stop nominatim postgres || true
              docker network rm nominatim-net-update2 || true

          - name: Import full style
            commands: |-
              # Start PostgreSQL with PostGIS
              docker network create nominatim-net4
              docker run -d --rm --name postgres --network nominatim-net4 \
                -e POSTGRES_PASSWORD=very_secure_password \
                -e POSTGRES_USER=postgres \
                -e POSTGRES_DB=nominatim \
